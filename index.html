<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tính Lượng Đùn</title>
<style>
body { font-family: Arial; padding: 20px; }
input, select, button {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  font-size: 16px;
}
.result {
  margin-top: 20px;
  font-weight: bold;
  font-size: 18px;
}
</style>
</head>

<body>

<h2>Tính Lượng Đùn (Shot Size)</h2>

<label>Khối lượng sản phẩm (g)</label>
<input type="number" id="weight">

<label>Đường kính trục vít (mm)</label>
<input type="number" id="diameter">

<label>Chọn vật liệu</label>
<select id="material">
  <option value="1.41">POM</option>
  <option value="1.31">PBT</option>
  <option value="0.95">PE</option>
  <option value="1.35">PPS</option>
  <option value="1.20">PC</option>
</select>

<button onclick="calculate()">Tính</button>

<div class="result" id="result"></div>

<script>
function calculate() {
  let W = parseFloat(document.getElementById("weight").value);
  let D = parseFloat(document.getElementById("diameter").value) / 10; // mm -> cm
  let rho = parseFloat(document.getElementById("material").value);

  if (!W || !D) {
    document.getElementById("result").innerHTML = "Nhập đầy đủ dữ liệu!";
    return;
  }

  let V = W / rho;
  let A = Math.PI * D * D / 4;
  let L = V / A;

  document.getElementById("result").innerHTML =
    "Thể tích: " + V.toFixed(2) + " cm³<br>" +
    "Hành trình đùn: " + (L * 10).toFixed(2) + " mm";
}
</script>

</body>
</html>
